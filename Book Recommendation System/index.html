<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Recommendation System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .header {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
        }

        .book {
            width: 200px;
            margin-bottom: 20px;
            text-align: center;
        }

        .book img {
            width: 150px;
            height: 200px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <div class="header">Book Recommendation System</div>
    <select id="book-dropdown">
        <!-- Populate options dynamically using JavaScript -->
    </select>
    <button onclick="showRecommendation()">Show Recommendation</button>
    <div class="container" id="recommendations">
        <!-- Recommendations will be displayed here -->
    </div>

    <script>
        // Function to fetch recommendations and display them
        function showRecommendation() {
            var selectedBook = document.getElementById("book-dropdown").value;

            // Fetch recommendations from backend (e.g., using AJAX)
            // Replace this with your actual backend API endpoint
            var apiUrl = 'https://your-api-url.com/recommendations?book=' + selectedBook;

            fetch(apiUrl)
                .then(response => response.json())
                .then(data => {
                    var recommendations = data.recommendations;
                    var recommendationContainer = document.getElementById("recommendations");
                    recommendationContainer.innerHTML = "";

                    recommendations.forEach(recommendation => {
                        var bookDiv = document.createElement("div");
                        bookDiv.classList.add("book");
                        bookDiv.innerHTML = `
                            <div>${recommendation.book}</div>
                            <img src="${recommendation.poster}">
                        `;
                        recommendationContainer.appendChild(bookDiv);
                    });
                })
                .catch(error => {
                    console.error('Error:', error);
                });
        }

        // Function to populate dropdown with book names
        function populateDropdown() {
            var dropdown = document.getElementById("book-dropdown");
            var bookNames = ["Book 1", "Book 2", "Book 3"]; // Replace with actual book names

            bookNames.forEach(bookName => {
                var option = document.createElement("option");
                option.text = bookName;
                option.value = bookName;
                dropdown.appendChild(option);
            });
        }

        // Populate dropdown on page load
        window.onload = function () {
            populateDropdown();
        };
    </script>
</body>

</html>
